<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe - Level 1 Easy</title>
<style>
body{background:#0d0d0d;color:white;text-align:center;font-family:sans-serif;padding-top:40px}
h2{margin-bottom:5px}
#board{display:grid;grid-template-columns:repeat(3,100px);gap:8px;justify-content:center;margin:20px auto}
.cell{width:100px;height:100px;background:#1a1a1a;font-size:60px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:12px;font-weight:bold;transition:0.2s}
.cell:hover{filter:brightness(1.3)}
#status{font-size:18px;margin-bottom:10px}
</style>
</head>
<body>
<h2>Level 2/3: Easy tik tak toe</h2>
<div id="status">Your turn - X</div>
<div id="board"></div>

<script>
let board=Array(9).fill("");let player="X";let bot="O";let gameOver=false;
const status=document.getElementById("status");
const boardDiv=document.getElementById("board");

for(let i=0;i<9;i++){let c=document.createElement("div");c.className="cell";c.onclick=()=>click(i);boardDiv.appendChild(c);}
update();

function click(i){
if(board[i]||gameOver)return;
board[i]=player;update();
if(checkWin(player)){status.innerText="You win! Loading Level 3...";gameOver=true;setTimeout(()=>location.href="hard.html",1500);return;}
if(board.every(x=>x)){status.innerText="Draw! Try again";gameOver=true;return;}
setTimeout(botMove,500);
}

function botMove(){
let empty=board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
let move=empty[Math.floor(Math.random()*empty.length)];
board[move]=bot;update();
if(checkWin(bot)){status.innerText="Bot wins! Try again";gameOver=true;}
}

function update(){
document.querySelectorAll(".cell").forEach((cell,i)=>{
cell.innerText=board[i]||"";
cell.style.background=board[i]==="X"?"#FFD700":board[i]==="O"?"#FF4444":"#1a1a1a";
cell.style.color=board[i]?"#000":"white";
});
}

function checkWin(p){let w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];return w.some(x=>x.every(i=>board[i]==p));}
</script>
</body>
</html>
